name: Terraform AWS

on:
  pull_request:
    paths:
      - "infra/aws/**"
      - ".github/workflows/terraform-aws.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_VAR_project_name: smart-request-hub
  TF_VAR_environment: prod
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_mongo_uri: ${{ secrets.TF_VAR_MONGO_URI }}
  TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_github_branch: main
  TF_VAR_github_oidc_provider_arn: ${{ vars.GITHUB_OIDC_PROVIDER_ARN }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=infra/aws fmt -check -recursive

      - name: Terraform init (validate mode)
        run: terraform -chdir=infra/aws init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/aws validate

  plan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform -chdir=infra/aws init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \

      - name: Terraform plan
        run: terraform -chdir=infra/aws plan -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/aws/tfplan

  apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    needs: plan
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infra/aws

      - name: Terraform Init
        run: |
          terraform -chdir=infra/aws init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Apply
        run: terraform -chdir=infra/aws apply -auto-approve
